app:
  name: "Explainable Proctoring System"
  environment: "local"
  debug: true
monitoring_mode:
  selected_mode: "B"
  available_modes: ["A", "B", "C"]
camera:
  enable_dual_camera: true
  primary_camera_index: 0
  secondary_camera_index: 1
  frame_width: 640
  frame_height: 480
  fps: 15
  save_screenshots: true
  save_clips: false
audio:
  enable_audio_monitoring: true
  sample_rate: 16000
  chunk_seconds: 2
  enable_voice_verification: false
identity:
  enable_face_verification: true
  enable_liveness_check: true
  reauthentication_interval_seconds: 300
  face_match_threshold: 0.65
fusion:
  risk_time_window_seconds: 20
  low_risk_threshold: 25
  medium_risk_threshold: 50
  high_risk_threshold: 75
  critical_risk_threshold: 90
  duplicate_suppression_seconds: 10
storage:
  database_path: "data/proctoring.db"
  enrolment_dir: "data/enrolment"
  evidence_dir: "data/evidence"
  screenshot_dir: "outputs/screenshots"
  report_dir: "outputs/reports"
  export_dir: "outputs/exports"
logging:
  log_path: "logs/system.log"
  event_log_path: "logs/events.csv"
  audit_log_path: "logs/audit.log"
privacy:
  retention_days: 30
  store_raw_video: false
  store_event_screenshots: true
rbac:
  default_role: "Admin"
